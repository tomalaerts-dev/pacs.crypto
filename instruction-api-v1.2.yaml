openapi: 3.1.0

info:
  title: pacs.crypto — Blockchain Payment Instruction API
  version: 1.2.0
  description: |
    # Blockchain Payment Instruction API

    **Second specification in the pacs.crypto family.**

    This API allows a bank or corporate treasury to instruct a VASP to execute a
    blockchain token transfer on their behalf — in the same way a bank today instructs
    a correspondent bank via ISO 20022 pacs.008. The instruction carries payment details,
    Travel Rule identity data, and structured remittance information in a single
    submission. The VASP handles key management, transaction signing, broadcast,
    and confirmation reporting.

    ## Relation to pacs.008.001.14

    The data model is grounded in `CreditTransferTransaction73` from pacs.008.001.14,
    preserving field names, component structures, and semantics wherever applicable.
    Crypto-specific extensions are added where pacs.008 has no equivalent:
    token and chain identification (ISO 24165 DTI/DLI), wallet addresses, on/off-ramp
    instructions, slippage controls, nonce management, gas fee handling, and
    on-chain settlement reporting.

    Elements from pacs.008 that are not relevant to blockchain transfers (correspondent
    banking chains of three or more intermediary agents, RTGS clearing channel codes,
    mandate data) are omitted or marked optional with explanatory notes.

    ## Custody model

    Two custody arrangements are supported:

    **Full custody** — the VASP holds private keys on behalf of the instructing party.
    The instructing party submits the instruction; the VASP signs and broadcasts.
    This is the simpler model and suitable for most bank-VASP relationships.
    The `nonce` field is not used.

    **Delegated signing** — the instructing party holds its own private key (typically
    in an HSM). The flow is two-step: (1) POST instruction → VASP returns unsigned
    transaction; (2) instructing party signs and submits signed transaction via
    `POST /instruction/{instructionId}/signed-transaction`. The VASP broadcasts and
    reports confirmation. The `nonce` field may be populated by the VASP in step 1
    or provided by the instructing party if it manages its own nonce sequence.

    ### Two delegated signing payload formats

    The VASP returns one of two payload formats in step 1, selected by the
    instructing party via the `signing_payload_format` field on the instruction:

    **Full unsigned transaction** (default) — the VASP returns the complete
    unsigned blockchain transaction in wire format (RLP-encoded for EVM, PSBT for
    Bitcoin, etc). The signing infrastructure (HSM, signing service) constructs
    the hash from the transaction internally and signs it, with full visibility
    into the transaction content. This pattern allows the HSM to enforce signing
    policies based on transaction semantics (e.g. amount limits, allowlist
    destinations) and to log meaningful audit records. Recommended for
    enterprise HSMs and signing services that natively support the relevant
    chain's transaction format.

    **Compact signing hash** — the VASP returns a precomputed signing hash plus
    cross-check fields (instruction ID, chain DLI, amount, expected recipient,
    nonce) signed by the VASP. The signing infrastructure receives the hash and
    signs it without seeing the underlying transaction. The instructing party's
    application layer is responsible for verifying the cross-check fields
    against its own record of the original instruction before passing the hash
    to the signing service.

    The compact format is appropriate for institutional contexts where the
    signing service genuinely cannot reconstruct chain-specific transaction
    formats internally — for example, MPC threshold signing services that
    produce signatures over arbitrary 32-byte digests, hardware-wallet
    integrations for non-EVM chains, or air-gapped signers that operate on
    presented hashes only.

    The compact format **shifts the verification responsibility** from the
    signing service (which sees the full transaction in the default pattern)
    to the instructing party's application layer (which sees the cross-check
    fields and must verify them before forwarding the hash). Implementers must
    treat this as a security property change: a compromised application layer
    feeding a malicious hash to an HSM cannot be detected by the HSM itself.
    The compact format should therefore be used only in trusted-VASP contexts
    where the relationship is established with sufficient operational, legal,
    and compliance assurance.

    To make the cross-check fields a binding commitment by the VASP, the
    `SigningHashPayload` is itself end-to-end signed by the VASP under its
    operational signing key (separate from any chain-specific keys). This
    converts the cross-check fields — including the amount — into a
    non-repudiation artefact: the VASP cannot later claim that the hash they
    presented was for a different transaction or amount.

    ## On/off-ramp

    The `ramp_instruction` object supports four ramp patterns:
    - **ONRAMP** — instruct in fiat or stablecoin A, transfer executes in token B
    - **OFFRAMP** — transfer executes in token, deliver in fiat or stablecoin to beneficiary
    - **ONRAMP_AND_OFFRAMP** — fiat in, fiat out, blockchain leg is internal to VASP
    - **NONE** — no ramp, token in equals token out (default)

    The `instruction_for_next_agent` field (ISO 20022 pacs.008 idiom) carries the
    coded ramp instruction for compatibility with pacs.008-processing systems alongside
    the structured `ramp_instruction` object.

    ## Slippage control

    The `maximum_slippage_rate` field bounds execution risk on stablecoin and token
    transfers where DEX liquidity depth affects the effective rate. If the VASP
    cannot execute within the slippage tolerance, the instruction is rejected with
    status `SLIPPAGE_EXCEEDED` rather than executed at an unexpected rate.

    ## Pre-execution quote

    Before committing an instruction, the instructing party may request a quote via
    `POST /instruction/quote`. The quote response includes estimated gas cost in native
    token and fiat equivalent, VASP service fee, ramp spread if applicable, estimated
    confirmation time, and an expiry timestamp. The instructing party may then submit
    the instruction referencing the `quote_id`, locking the quoted fee schedule for
    the quote validity window.

    ## Instruction expiry

    The `expiry_date_time` field (carried from pacs.008 `GroupHeader131`) sets a
    deadline after which the instruction lapses if not yet executed. If chain congestion
    or liquidity conditions prevent execution within the window, the VASP returns
    status `EXPIRED` rather than executing at an unexpected time. Instructing parties
    should set realistic expiry windows per chain (e.g. 30 minutes for EVM, 5 minutes
    for Solana) and should not set expiry windows so short that normal confirmation
    latency would cause systematic expiry.

    ## Reporting and finality

    The `GET /instruction/{instructionId}` endpoint returns current instruction status
    with on-chain confirmation data. `FinalityStatus` is an explicit enum
    (`PENDING` / `PROBABILISTIC` / `FINAL`) distinct from confirmation depth, because
    chain-specific finality semantics vary: Ethereum post-merge achieves economic
    finality at ~13 minutes independent of confirmation count; Bitcoin convention is
    6 confirmations; Solana achieves finality in approximately 400ms.

    ## Sanctions compliance

    Sanctions screening is performed by the VASP as an independent regulatory
    obligation — it is not a step in the instruction processing pipeline that is
    reported back to the instructing party.

    This design is legally required. Communicating a sanctions finding to the
    instructing party — whether through a dedicated status code, an error field, or
    any other signal — constitutes tipping off, which is a criminal offence under
    EU AMLD Article 39, UK Proceeds of Crime Act 2002, and US Bank Secrecy Act.
    The absence of a `COMPLIANCE_HOLD`, `WALLET_SCREENING_FAILED`, or equivalent
    status in this specification is therefore a deliberate and legally correct design
    decision, not a gap.

    Where an instruction cannot be executed for reasons that cannot be disclosed,
    the VASP returns `FAILED` with no `failure_reason` field populated. The
    instructing party must treat an unexplained `FAILED` response as requiring
    their own independent internal review — they should not attempt to infer the
    reason from the failure, the timing of the response, or any other observable
    signal. Implementers must not add any field, timing behaviour, or side channel
    that would allow the instructing party to infer a sanctions finding.

    The instructing party retains its own independent sanctions screening obligations
    for its customers and for the counterparty wallets it instructs to fund. Receiving
    a `FINAL` status from the VASP does not constitute a sanctions clearance.

    ## Returns and reversals — compensating transactions

    On-chain transactions cannot be reversed once final. A payment that is settled
    on-chain stays settled. The blockchain has no equivalent to the "unwind" semantics
    that ISO 20022 pacs.004 (return) and pacs.007 (reversal) assume in traditional
    payment systems, where a sending bank can ask a receiving bank to reverse a wire
    transfer by debiting the credited account and re-crediting the original.

    The pacs.crypto remediation model is therefore: **a compensating transaction in
    the opposite direction, linked to the original by reference**. The receiving party
    cannot give back what they have already received except by sending it back. That
    is the only operation the chain supports, and it is the one pacs.crypto exposes.

    The relationship between pacs.crypto endpoints and ISO 20022 messages:

    | ISO 20022 | pacs.crypto endpoint | Initiator | Mechanism |
    |---|---|---|---|
    | pacs.004 (Return) | `POST /instruction/{id}/return` | Receiving party (creditor or creditor agent) | New compensating instruction in opposite direction |
    | pacs.007 (Reversal) | `POST /instruction/{id}/reverse` | Sending party (debtor or debtor agent) | New compensating instruction in opposite direction |
    | camt.056 (Cancellation request, pre-broadcast) | `DELETE /instruction/{instructionId}` | Either party | Direct cancellation if not yet broadcast |
    | camt.056 (Cancellation request, post-finality) | `POST /instruction/{id}/return` or `/reverse` (with reason `CANC`) | Either party | Compensating transaction, requires receiver consent |

    The first two rows are the post-finality remediation cases (the original
    transaction is `FINAL` and cannot be unwound on-chain). The third row is the
    pre-broadcast cancellation case (covered by the existing `DELETE` endpoint and
    unchanged by this increment). The fourth row covers the case where a party wants
    to cancel a transaction that has already settled, which on-chain is operationally
    identical to a return or reversal — the only honest mechanism is a compensating
    transfer.

    ### Compensating transaction semantics

    A compensating transaction produced by `POST /instruction/{id}/return` or
    `POST /instruction/{id}/reverse`:

    - Is itself a new payment instruction with its own `instruction_id`, its own
      `uetr`, its own credential attestation requirements, and its own Travel Rule
      obligation under FATF Recommendation 16.
    - Carries `original_instruction_id`, `original_uetr`, and `original_transaction_hash`
      fields linking it to the transaction it is compensating.
    - Carries a structured `return_reason` or `reversal_reason` from the pacs.004 /
      pacs.007 reason code sets (`AC01`, `AM05`, `BE04`, `RR04`, `CANC`, etc.),
      preserved for downstream regulatory reporting.
    - Has its own settlement lifecycle. The compensating transaction goes through
      `PENDING` → `BROADCAST` → `CONFIRMING` → `FINAL` exactly like any other
      instruction.
    - Does not modify the original transaction's status. The original remains `FINAL`
      with an additional flag indicating that a compensating transaction has been
      issued (statuses `RETURNED` and `REVERSED` on the original record are derived
      states, not lifecycle states).

    The receiving party must consent to receive a compensating transfer. There is no
    equivalent of the traditional return mechanism where a receiving bank can
    unilaterally reject and return a credit — on-chain, the funds have already
    arrived at the destination wallet, and the holder of that wallet must cooperate
    to send them back. This consent is bilateral and out-of-band in the current spec;
    it may be formalised in a future increment.

    ### Reason code semantics

    The return and reversal reason codes preserve the ISO 20022 reason code semantics
    with one extension specific to crypto:

    - `CANC` — Cancellation request from originator after settlement (covers the
      "I sent this by mistake, please send it back" case)
    - `AC01` — Incorrect account number / wrong wallet address (covers the
      "address fat-finger" case where the original intended beneficiary did not
      receive the transfer)
    - `AC04` — Account closed (covers VASP-side wallet retirement)
    - `AM05` — Duplication
    - `BE04` — Missing creditor address (informational; does not block on-chain)
    - `RC03` — Invalid debtor BIC (correspondent-banking case; rare for crypto)
    - `RR04` — Regulatory reason (covers post-settlement sanctions match, handled
      with tipping-off considerations — see Sanctions compliance section above)
    - `FRAD` — Fraudulent originator (covers the "originating bank discovered fraud
      after settlement" case)
    - `TECH` — Technical problem (covers the case where the original transfer
      completed but with technical anomalies the parties have agreed to remediate)
    - `NARR` — Narrative (free text in `additional_information` if no code applies)

    ### Limitations honestly stated

    - A compensating transaction requires the holder of the destination wallet to
      participate. If the receiving party does not consent or has lost control of
      the wallet, no remediation is possible through this mechanism.
    - A compensating transaction has its own gas cost, its own finality lifecycle,
      and its own regulatory implications. It is not a costless undo.
    - Sanctions remediation is constrained by tipping-off rules. If a return is
      initiated for reason `RR04` (regulatory), the implementation must not
      communicate the sanctions detail to the original sender. The pattern
      established in the Sanctions compliance section above applies. The same
      discipline applies to reversal rejections — see "Reversal rejection
      semantics" below.

    ### Reversal rejection semantics

    Receivers may reject a reversal request for a range of operational and
    confidentiality reasons. The structured rejection codes provided
    (`WALLET_LOST_CONTROL`, `CUSTOMER_REFUSED`, `OPERATIONAL`,
    `INVESTIGATION_PENDING`, `OTHER`) are deliberately constructed so that none
    of them signals a regulatory or sanctions-related reason directly.

    There is no `RR04` or other regulatory rejection code. This is the same
    architectural discipline that drives the Sanctions compliance section
    above: introducing a structured code to express *why* a regulatory action
    happened creates a tipping-off vocabulary, even when the intention is the
    opposite. A receiver who refuses to issue a compensating transaction for
    sanctions-related reasons must use `OTHER` (or `INVESTIGATION_PENDING`
    where genuinely accurate), and must not populate the optional
    `rejection_reason` narrative with anything that would reveal the
    regulatory underpinning.

    The `OTHER` code is the catch-all that absorbs both routine rejections
    (operational quirks, customer-confidentiality matters, scheduling) and
    genuinely undisclosable rejections. The senders of reversal requests
    cannot infer that an `OTHER` rejection is sanctions-related, because most
    `OTHER` rejections in practice will be routine. That statistical cover is
    the discipline.

    Senders receiving an unexplained or `OTHER`-coded rejection must not
    attempt to infer the underlying reason from the rejection code, the
    response timing, or any other signal. They must treat the rejection as
    requiring their own independent compliance review based on their
    obligations as a regulated entity.

    ### Reversal status push notification

    Reversal request lifecycles span time periods (the receiver may take
    minutes, hours, or days to respond, and the compensating transaction once
    issued has its own settlement lifecycle). Polling-only status retrieval
    is operationally weak in this context: the sender has no idea when to
    poll, the receiver has no obligation to respond on any particular
    timeline, and the most operationally important transitions — receiver
    rejection, compensating transaction reaching `FINAL` — are exactly the
    ones the sender most needs to know about quickly.

    The spec therefore expects receiving VASPs to **push status updates** to
    the sending VASP whenever the reversal request transitions or the
    compensating transaction's lifecycle progresses. This is equivalent in
    spirit to camt.029 (Resolution of Investigation) responding to camt.056
    (Cancellation Request) in traditional banking.

    **Required push events:**

    - Receiver's initial response (`REQUESTED` → `ACCEPTED` or `REJECTED`)
    - Compensating instruction lifecycle progression (`PENDING` → `BROADCAST`
      → `CONFIRMING` → `FINAL`), at each major transition
    - Reversal request transitioning to `COMPLETED` when the compensating
      transaction reaches `FINAL`

    **Optional push events:**

    - Receiver requests additional information (e.g. for `FRAD` reasons
      requiring further context before deciding)
    - Sender withdrawal acknowledged

    The push payload schema is `ReversalStatusUpdate`. It is delivered to a
    callback URL specified by the sender either at request time (via the
    `webhook_url` field on `ReversalRequest`) or via prior bilateral
    arrangement between the sending and receiving VASPs. Authentication and
    retry behaviour follow the same pattern as the Travel Rule callback
    described in the pacs.crypto Travel Rule API.

    `GET /instruction/{instructionId}/reversal-status` remains available as a
    fallback for missed pushes, audit reconciliation, and explicit lookups.
    A complete implementation, however, must support push delivery — relying
    on the sender to poll is not sufficient.

    ## Status push notification (webhook)

    The `GET /instruction/{instructionId}` endpoint supports polling for instruction
    status. Push notification — where the VASP proactively notifies the instructing
    party when status changes (e.g. `BROADCAST`, `FINAL`, `FAILED`) — is supported
    bilaterally via webhook but is not defined as a normative endpoint in this spec.

    When implementing push notification, the payload should follow the
    `InstructionStatusResponse` schema defined here, delivered as a POST to a
    pre-agreed callback URL at the instructing party's endpoint. For a worked example
    of the general callback pattern — including authentication, retry behaviour, and
    the distinction between data quality acknowledgement and other notification types —
    refer to the `POST /travel-rule/{recordId}/callback` endpoint in the pacs.crypto
    Travel Rule API.

    The decision not to define a normative webhook endpoint here reflects the
    community spec principle of specifying what needs interoperability agreement
    (message format, field semantics, status codes) while leaving bilateral
    operational configuration (webhook URLs, authentication schemes, retry policies)
    to implementation agreements. If webhook format divergence proves to be an
    interoperability problem in practice, a normative callback endpoint is the
    natural next addition to this spec.

    ## Versioning policy

    This specification follows semantic versioning (`MAJOR.MINOR.PATCH`).

    **Backwards compatibility** is maintained within a major version. Minor version
    increments add optional fields or new enum values; they do not remove or rename
    existing fields or change the semantics of existing fields. Patch version
    increments correct documentation errors, clarify descriptions, or fix example
    values without changing the schema.

    **Breaking changes** (field removal, mandatory field addition, semantic change
    to an existing field) increment the major version. A deprecation notice period
    of at least six months will be observed before any breaking change is published,
    announced via the GitHub repository. Implementations should monitor the repository
    for deprecation notices and plan migration accordingly.

    **Enum extensibility:** The `InstructionStatus`, `FinalityStatus`, `RampType`,
    and `TokenStandard` enums may receive new values in minor versions as new chains,
    ramp patterns, and token standards are added. Implementations must handle unknown
    enum values gracefully — treat them as `OTHER` or surface them as unrecognised
    rather than hard-failing. This is the standard forwards-compatibility posture for
    extensible enumerations.

    ## Family alignment

    This API shares token identification (DTI/DLI/contract address), party identification
    (LEI recommended for organisations), wallet identification, blockchain settlement
    leg structure, regulatory reporting, and remittance information components with
    the pacs.crypto Travel Rule API. Implementations supporting both APIs share the
    same component library. The Travel Rule record `record_id` may be referenced on
    the instruction via `travel_rule_record_id` to link the instruction to its
    pre-submitted compliance record.

