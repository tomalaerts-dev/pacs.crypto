tags:
  - name: Quote
    description: Pre-execution fee and rate quotation
  - name: Instruction
    description: Blockchain payment instruction submission and management
  - name: Status
    description: Instruction status and on-chain confirmation reporting
  - name: Signed Transaction
    description: Delegated signing — submit signed transaction to VASP for broadcast

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  /instruction/quote:
    post:
      tags: [Quote]
      operationId: requestInstructionQuote
      summary: Request a pre-execution fee and rate quote
      description: |
        Returns an indicative quote before the instructing party commits an instruction.
        The quote includes estimated gas cost in native token and fiat equivalent,
        VASP service fee, ramp spread if applicable, current slippage estimate for the
        requested token and amount, and estimated confirmation time.

        The `quote_id` may be referenced on a subsequent instruction submission
        (`payment_identification/quote_id`) to lock the quoted fee schedule for the
        quote validity window. Quotes are non-binding if not referenced on an instruction.

        **Note:** Gas fees on EVM chains are volatile. The quote reflects conditions
        at the time of issuance. The `valid_until` timestamp indicates when the quote
        expires; instruct before this time to benefit from the quoted fees.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
            examples:
              usdc_quote:
                $ref: '#/components/examples/Example_Quote_USDC'
      responses:
        '200':
          description: Quote issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
              examples:
                usdc_quote_response:
                  $ref: '#/components/examples/Example_Quote_Response_USDC'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /instruction:
    post:
      tags: [Instruction]
      operationId: submitInstruction
      summary: Submit a blockchain payment instruction
      description: |
        Submits a payment instruction for a blockchain token transfer.
        The VASP validates the instruction, performs pre-execution checks
        (slippage, counterparty wallet screening, Travel Rule record linkage),
        and — in full custody mode — signs and broadcasts the transaction.

        In delegated signing mode, the VASP returns the unsigned transaction
        in the response body for the instructing party to sign and resubmit.

        **Required fields** follow pacs.008 mandatory elements:
        `payment_identification`, `interbank_settlement_amount`, `charge_bearer`,
        `debtor`, `debtor_agent`, `creditor_agent`, `creditor`, plus
        `blockchain_instruction` for chain/token/wallet specification.

        **Travel Rule linkage:** For transfers above the FATF Travel Rule threshold,
        a Travel Rule record should be pre-submitted to the Travel Rule API and its
        `record_id` provided in `travel_rule_record_id`. The VASP may reject
        instructions above threshold without a valid linked Travel Rule record.

        **Idempotency and safe retry:** `POST /instruction` is idempotent on
        `payment_identification/end_to_end_identification`. If a POST times out
        or returns a network error, the instructing party may safely resubmit the
        identical request. If an instruction with the same `end_to_end_identification`
        already exists, the VASP returns `409` with the original `instruction_id`
        and current status — no duplicate instruction is created. This guarantees
        safe retry behaviour for any transient failure between submission and
        acknowledgement. The instructing party should use the returned `instruction_id`
        to track the original instruction via `GET /instruction/{instructionId}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInstruction'
            examples:
              usdc_b2b:
                $ref: '#/components/examples/Example_USDC_B2B'
              usdc_onramp:
                $ref: '#/components/examples/Example_USDC_OnRamp'
              btc_full_custody:
                $ref: '#/components/examples/Example_BTC_FullCustody'
      responses:
        '201':
          description: |
            Instruction accepted. In full custody mode, the transaction has been
            queued for signing and broadcast. In delegated signing mode, the unsigned
            transaction is returned for the instructing party to sign.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: |
            Idempotent duplicate — an instruction with the same
            `payment_identification/end_to_end_identification` already exists.
            This is a safe retry response, not an error. The response body
            contains the original `instruction_id` and current status.
            The instructing party should use the `instruction_id` to continue
            tracking via `GET /instruction/{instructionId}`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /instruction/{instructionId}:
    get:
      tags: [Status]
      operationId: getInstruction
      summary: Retrieve instruction status and on-chain confirmation data
      description: |
        Returns the current status of an instruction with on-chain settlement
        data where available. Includes confirmation depth, finality status,
        transaction hash, block number, and actual gas cost.

        Poll this endpoint after submission to track confirmation progress,
        or use the callback mechanism (if agreed bilaterally) for push notification.
      parameters:
        - name: instructionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Instruction UUID returned at submission
      responses:
        '200':
          description: Instruction record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionStatusResponse'
              examples:
                confirmed:
                  $ref: '#/components/examples/Example_Status_Confirmed'
                pending:
                  $ref: '#/components/examples/Example_Status_Pending'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Instruction]
      operationId: cancelInstruction
      summary: Cancel a pending instruction
      description: |
        Attempts to cancel an instruction that has not yet been broadcast to the
        chain. Cancellation is only possible in status `PENDING` or `QUOTED`.
        Once the transaction is in the mempool (`BROADCAST`) or confirmed
        (`CONFIRMING` / `FINAL`), cancellation is not possible and the VASP will
        return `409 CANCELLATION_TOO_LATE`.

        **Note:** In delegated signing mode, if the instructing party has already
        signed and submitted the signed transaction, the VASP cannot prevent broadcast
        even if it has not yet relayed the transaction. The instructing party should
        not sign until ready to proceed.
      parameters:
        - name: instructionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instruction cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancellationResponse'
        '409':
          description: Cancellation not possible — instruction already broadcast or confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_code: CANCELLATION_TOO_LATE
                message: Transaction already in mempool — cannot cancel
                instruction_id: 7f3a2b1c-8d4e-5f6a-9b0c-1d2e3f4a5b6c
                status: BROADCAST
        '404':
          $ref: '#/components/responses/NotFound'

  /instruction/{instructionId}/signed-transaction:
    post:
      tags: [Signed Transaction]
      operationId: submitSignedTransaction
      summary: Submit a signed transaction for broadcast (delegated signing only)
      description: |
        In delegated signing mode, the instructing party receives an unsigned
        transaction in the `POST /instruction` response, signs it with their
        private key, and submits the signed transaction here for broadcast.

        The VASP validates the signature, broadcasts to the network, and begins
        monitoring for confirmation. Status transitions to `BROADCAST` on acceptance.

        **Nonce note:** The instructing party must ensure the nonce used in signing
        matches the nonce allocated by the VASP in the unsigned transaction response.
        Using a different nonce will cause signature validation failure.
      parameters:
        - name: instructionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignedTransactionSubmission'
      responses:
        '200':
          description: Signed transaction accepted and broadcast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastConfirmation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Instruction not in QUOTED status or already broadcast
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /instruction/search:
    get:
      tags: [Status]
      operationId: searchInstructions
      summary: Search instructions by filter criteria
      description: |
        Returns a paginated list of instructions matching the filter criteria.
        Queries the instructing party's own instruction records held by the VASP.
        Functionally analogous to ISO 20022 `camt.052` (intraday account report)
        for blockchain payment instructions.
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Start of time range (UTC ISO 8601)
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/InstructionStatus'
          style: form
          explode: false
        - name: chain_dli
          in: query
          schema:
            type: string
          description: Filter by chain DLI — bare 9-char value e.g. X9J9XDMTD
        - name: token_dti
          in: query
          schema:
            type: string
          description: Filter by token DTI — bare 9-char value e.g. T9B3X8H2K
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from previous response
      responses:
        '200':
          description: Matching instructions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionSearchResponse'

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    mutualTLS:
      type: mutualTLS
      description: |
        mTLS with certificates issued by a mutually agreed CA.
        See Deployment Ecosystem section of the pacs.crypto README for CA options.
    bearerToken:
      type: http
      scheme: bearer
      description: OAuth 2.0 bearer token — alternative to mTLS for bilateral deployments

  responses:
    BadRequest:
      description: Invalid request — schema validation failure or missing mandatory field
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Instruction not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: |
        Request is structurally valid but cannot be processed:
        slippage exceeded, Travel Rule record missing, wallet screening failure,
        unsupported token/chain combination, or quote expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    # ── ENUMERATIONS ──────────────────────────────────────────────────────────

    InstructionStatus:
      type: string
      description: |
        Lifecycle status of a blockchain payment instruction.
        Analogous to ISO 20022 pacs.002 status codes.

        | Status | Description |
        |---|---|
        | `PENDING` | Received and validated, awaiting execution |
        | `QUOTED` | Unsigned transaction returned (delegated signing only) |
        | `BROADCAST` | Transaction submitted to the blockchain network |
        | `CONFIRMING` | Transaction included in a block; awaiting required confirmation depth |
        | `FINAL` | Transaction confirmed to required depth; finality achieved |
        | `FAILED` | Execution failed — see `failure_reason` |
        | `CANCELLED` | Cancelled by instructing party before broadcast |
        | `EXPIRED` | Instruction lapsed after `expiry_date_time` without execution |
        | `SLIPPAGE_EXCEEDED` | Rejected — actual slippage exceeded `maximum_slippage_rate` |
        | `RAMP_FAILED` | On/off-ramp execution failed — see `failure_reason` |
      enum:
        - PENDING
        - QUOTED
        - BROADCAST
        - CONFIRMING
        - FINAL
        - FAILED
        - CANCELLED
        - EXPIRED
        - SLIPPAGE_EXCEEDED
        - RAMP_FAILED

    FinalityStatus:
      type: string
      description: |
        On-chain finality classification. Distinct from `confirmation_depth` because
        finality semantics vary by chain:
        - Ethereum post-merge: economic finality at ~13 min (2 checkpoint epochs),
          independent of confirmation count
        - Bitcoin: probabilistic finality; convention is 6 confirmations (~60 min)
        - Solana: finality achieved in ~400ms via Tower BFT; single confirmation suffices

        | Status | Meaning |
        |---|---|
        | `PENDING` | Not yet included in a block |
        | `PROBABILISTIC` | Included and has confirmations; not yet chain-final |
        | `FINAL` | Chain-final or equivalent by chain convention |
      enum:
        - PENDING
        - PROBABILISTIC
        - FINAL

    RampType:
      type: string
      description: |
        On/off-ramp pattern for this instruction.

        | Code | Description |
        |---|---|
        | `NONE` | No ramp — token in equals token out |
        | `ONRAMP` | Instruct in fiat or stablecoin A; VASP converts to token B for transfer |
        | `OFFRAMP` | Transfer in token; VASP converts to fiat or stablecoin for delivery |
        | `ONRAMP_AND_OFFRAMP` | Fiat/stablecoin in, fiat/stablecoin out; VASP executes blockchain leg internally |
      enum:
        - NONE
        - ONRAMP
        - OFFRAMP
        - ONRAMP_AND_OFFRAMP

    CustodyModel:
      type: string
      description: |
        Identifies the signing arrangement for this instruction.
        Must be agreed bilaterally between instructing party and VASP.
      enum:
        - FULL_CUSTODY
        - DELEGATED_SIGNING

    ChargeBearerCode:
      type: string
      description: |
        Specifies which party bears charges. Follows ISO 20022 `ChargeBearerType1Code`.
        `SLEV` (service level) applies where the bilateral agreement specifies charge handling.
      enum:
        - DEBT
        - CRED
        - SHAR
        - SLEV

    TokenStandard:
      type: string
      description: |
        Token contract standard. Informational — the VASP determines contract
        interaction method. Provided by instructing party as context.
      enum:
        - ERC-20
        - ERC-721
        - ERC-1155
        - SPL
        - TRC-20
        - BEP-20
        - NATIVE
        - OTHER

    # ── IDENTIFIERS AND PRIMITIVES ────────────────────────────────────────────

    LEIIdentifier:
      type: string
      pattern: '^[A-Z0-9]{18,18}[0-9]{2,2}$'
      description: |
        Legal Entity Identifier (ISO 17442). Recommended for all organisation
        identification fields. The LEI is the only globally unique, publicly
        verifiable, and jurisdiction-neutral identifier for legal entities —
        the natural fit for cross-border instructions where counterparties may
        be unknown to each other.

    BICIdentifier:
      type: string
      pattern: '^[A-Z0-9]{4,4}[A-Z]{2,2}[A-Z0-9]{2,2}([A-Z0-9]{3,3}){0,1}$'
      description: Business Identifier Code (ISO 9362) — 8 or 11 character BIC.

    UUIDv4:
      type: string
      format: uuid
      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'

    WalletAddress:
      type: string
      maxLength: 200
      description: |
        Blockchain wallet or contract address. Format is chain-specific:
        EVM chains use 0x-prefixed 40-hex-char address; Bitcoin uses Base58Check or Bech32;
        Solana uses Base58 44-char address; XRP uses Base58Check 25-34 char address.

    DTIIdentifier:
      type: string
      pattern: '^DTID/[A-Z0-9]{9}$'
      description: |
        ISO 24165-1 Digital Token Identifier in `DTID/<9-char>` format.
        Registry: https://dtif.org

    DLIIdentifier:
      type: string
      pattern: '^DLID/[A-Z0-9]{9}$'
      description: |
        ISO 24165-2 Digital Ledger Identifier in `DLID/<9-char>` format.
        Registry: https://dtif.org

    # ── PARTY IDENTIFICATION ──────────────────────────────────────────────────

    PartyIdentification:
      type: object
      description: |
        Party identification. Follows `PartyIdentification272` from pacs.008.001.14.
        LEI is recommended for organisation identification. For natural persons,
        provide name plus at least one of: date_and_place_of_birth, national_id.
      required: [name]
      properties:
        name:
          type: string
          maxLength: 140
          description: Full legal name of the party.
        lei:
          $ref: '#/components/schemas/LEIIdentifier'
          description: |
            Legal Entity Identifier. Recommended for all organisation parties.
            Populate alongside `name` for maximum interoperability.
        country:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2 country code of the party.
        postal_address:
          $ref: '#/components/schemas/PostalAddress'
        date_and_place_of_birth:
          type: object
          description: For natural persons.
          required: [birth_date, city_of_birth, country_of_birth]
          properties:
            birth_date:
              type: string
              format: date
            city_of_birth:
              type: string
              maxLength: 35
            country_of_birth:
              type: string
              pattern: '^[A-Z]{2}$'
        national_id:
          type: object
          description: National identification number for natural persons.
          properties:
            identification:
              type: string
              maxLength: 35
            scheme_name:
              type: string
              description: e.g. NIDN (national ID number), CCPT (passport), DRLC (driving licence)
              maxLength: 35
            issuer:
              type: string
              maxLength: 35
            country_of_issue:
              type: string
              pattern: '^[A-Z]{2}$'
        organisation_id:
          type: object
          description: Organisation identification (non-LEI). Use LEI where available.
          properties:
            bic_or_bei:
              $ref: '#/components/schemas/BICIdentifier'
            other:
              type: object
              properties:
                identification:
                  type: string
                  maxLength: 35
                scheme_name:
                  type: string
                  maxLength: 35

    PostalAddress:
      type: object
      description: Postal address. Follows `PostalAddress27` from pacs.008.001.14.
      properties:
        street_name:
          type: string
          maxLength: 140
        building_number:
          type: string
          maxLength: 16
        post_code:
          type: string
          maxLength: 16
        town_name:
          type: string
          maxLength: 140
        country_sub_division:
          type: string
          maxLength: 35
        country:
          type: string
          pattern: '^[A-Z]{2}$'

    AgentIdentification:
      type: object
      description: |
        Financial institution or VASP identification.
        Follows `BranchAndFinancialInstitutionIdentification8` from pacs.008.001.14.
        Use LEI for VASPs; BIC for banks.
      required: [name]
      properties:
        bic:
          $ref: '#/components/schemas/BICIdentifier'
        lei:
          $ref: '#/components/schemas/LEIIdentifier'
        name:
          type: string
          maxLength: 140
        country:
          type: string
          pattern: '^[A-Z]{2}$'

    # ── TOKEN AND CHAIN IDENTIFICATION ────────────────────────────────────────

    TokenIdentification:
      type: object
      description: |
        Identifies the token to be transferred. Populate multiple identifiers
        where available — the receiving system uses the most specific identifier
        it can resolve.

        **Priority order:**
        1. `token_dti` — ISO 24165-1 DTI, preferred where registered
        2. `contract_address` + `chain_dli` — universally resolvable fallback; always include for on-chain tokens
        3. `isin` — for tokenised securities where ISIN is the primary identifier
        4. `token_symbol` — human-readable fallback only; not machine-resolvable

        **Token issuer:** `token_issuer` provides the name and LEI/BIC of the issuing
        entity (e.g. Circle Internet Financial for USDC, Tether Ltd for USDT).
        Important for regulated stablecoins under MiCA and equivalent frameworks.
      properties:
        token_dti:
          type: string
          pattern: '^[A-Z0-9]{9}$'
          description: |
            ISO 24165-1 Digital Token Identifier — bare 9-character value.
            No DTID/ prefix in this field; the field name makes the type explicit.
            Use DTID/<value> only in generic ISO 20022 fields such as
            local_instrument/proprietary or settlement_information/clearing_system/proprietary.
            Registry: https://dtif.org
          example: "T9B3X8H2K"
        contract_address:
          $ref: '#/components/schemas/WalletAddress'
          description: Token contract address on the source chain. Always include for on-chain tokens.
        chain_dli:
          type: string
          pattern: '^[A-Z0-9]{9}$'
          description: |
            ISO 24165-2 Digital Ledger Identifier — bare 9-character value.
            No DLID/ prefix in this field; the field name makes the type explicit.
            Required when contract_address is present.
            Registry: https://dtif.org
          example: "X9J9XDMTD"
        isin:
          type: string
          pattern: '^[A-Z]{2}[A-Z0-9]{9}[0-9]$'
          description: ISIN for tokenised securities.
        token_symbol:
          type: string
          maxLength: 20
          description: Human-readable symbol (e.g. USDC, ETH). Not machine-resolvable; fallback only.
        token_standard:
          $ref: '#/components/schemas/TokenStandard'
        token_issuer:
          type: object
          description: Issuing entity of the token. Recommended for regulated stablecoins.
          properties:
            name:
              type: string
              maxLength: 140
            lei:
              $ref: '#/components/schemas/LEIIdentifier'
            bic:
              $ref: '#/components/schemas/BICIdentifier'

    # ── RAMP INSTRUCTION ─────────────────────────────────────────────────────

    RampInstruction:
      type: object
      description: |
        Structured on/off-ramp instruction. Complements the coded
        `instruction_for_next_agent` field (ISO 20022 pacs.008 idiom).

        For ONRAMP: `instructed_token` is the token the instructing party delivers
        to the VASP; `execution_token` is what the VASP acquires for the blockchain
        transfer leg.

        For OFFRAMP: `execution_token` is what the VASP transfers on-chain;
        the VASP converts to `delivery_token` for final delivery to the beneficiary.

        `ramp_vasp` identifies the entity performing the ramp conversion if different
        from the instructed VASP (e.g. a specialist liquidity provider).
      required: [ramp_type]
      properties:
        ramp_type:
          $ref: '#/components/schemas/RampType'
        instructed_token:
          $ref: '#/components/schemas/TokenIdentification'
          description: Token delivered by the instructing party to the VASP.
        execution_token:
          $ref: '#/components/schemas/TokenIdentification'
          description: Token used for the blockchain transfer leg.
        delivery_token:
          $ref: '#/components/schemas/TokenIdentification'
          description: Token delivered to the beneficiary (OFFRAMP / ONRAMP_AND_OFFRAMP).
        ramp_vasp:
          $ref: '#/components/schemas/AgentIdentification'
          description: Ramp provider if different from the instructed VASP.
        maximum_ramp_slippage_rate:
          type: string
          maxLength: 19
          pattern: '^0*(\d{0,2}\.\d{1,8}|\d{0,3})$'
          description: |
            Maximum acceptable slippage on the ramp conversion leg, expressed as a
            decimal fraction (e.g. `0.005` = 0.5%). If the ramp cannot be executed
            within this tolerance, the instruction is rejected with `RAMP_FAILED`.
        at_vasp_discretion:
          type: boolean
          default: false
          description: |
            If true, the VASP may select the ramp token and route at its discretion
            within the instructed parameters. If false, the VASP must follow the
            `execution_token` specification exactly.

    # ── FEE AND QUOTE ─────────────────────────────────────────────────────────

    FeeEstimate:
      type: object
      description: Estimated fee breakdown for a blockchain payment instruction.
      properties:
        gas_cost_native:
          type: object
          description: Estimated gas cost in the chain's native token.
          properties:
            amount:
              type: string
              maxLength: 30
            currency:
              type: string
              maxLength: 20
              description: Native token symbol or DTI.
        gas_cost_fiat:
          type: object
          description: Estimated gas cost in fiat equivalent.
          properties:
            amount:
              type: string
              maxLength: 19
            currency:
              type: string
              pattern: '^[A-Z]{3}$'
        vasp_service_fee:
          type: object
          description: VASP service fee charged to the instructing party.
          properties:
            amount:
              type: string
              maxLength: 19
            currency:
              type: string
              pattern: '^[A-Z]{3}$'
        ramp_spread_bps:
          type: integer
          description: Ramp conversion spread in basis points, if applicable.
        slippage_estimate_bps:
          type: integer
          description: Estimated DEX slippage in basis points for the token and amount.
        total_cost_fiat:
          type: object
          description: Total estimated cost to the instructing party in fiat.
          properties:
            amount:
              type: string
              maxLength: 19
            currency:
              type: string
              pattern: '^[A-Z]{3}$'

    QuoteRequest:
      type: object
      required: [token, chain_dli, amount, currency, custody_model]
      properties:
        token:
          $ref: '#/components/schemas/TokenIdentification'
        chain_dli:
          $ref: '#/components/schemas/DLIIdentifier'
        amount:
          type: string
          maxLength: 30
          description: Token amount to be transferred.
        currency:
          type: string
          maxLength: 10
          description: ISO 4217 currency or token symbol.
        ramp_type:
          $ref: '#/components/schemas/RampType'
        delivery_currency:
          type: string
          maxLength: 10
          description: Delivery currency for OFFRAMP / ONRAMP_AND_OFFRAMP.
        custody_model:
          $ref: '#/components/schemas/CustodyModel'
        requested_execution_time:
          type: string
          format: date-time
          description: Preferred execution time. VASP provides best-effort.

    QuoteResponse:
      type: object
      properties:
        quote_id:
          $ref: '#/components/schemas/UUIDv4'
        valid_until:
          type: string
          format: date-time
          description: Quote expiry. Reference this quote on the instruction before this time.
        fee_lock_type:
          type: string
          enum: [INDICATIVE, CAPPED, EXACT]
          description: |
            Defines what the VASP commits to when the instructing party references
            this `quote_id` on a subsequent instruction submission.

            | Value | Meaning |
            |---|---|
            | `INDICATIVE` | No fee commitment — quote is for planning purposes only; actual fees may differ |
            | `CAPPED` | VASP commits that the total fee will not exceed the quoted amount; overruns are absorbed by the VASP |
            | `EXACT` | VASP commits to the exact quoted fee schedule for the `valid_until` window |

            Implementers should treat an absent `fee_lock_type` as `INDICATIVE`.
            The lock type is determined by the bilateral service agreement and
            chain conditions at the time of quotation — gas-volatile chains will
            typically offer `INDICATIVE` or `CAPPED` rather than `EXACT`.
        fee_estimate:
          $ref: '#/components/schemas/FeeEstimate'
        estimated_confirmation_seconds:
          type: integer
          description: Estimated time to probabilistic finality in seconds.
        chain_conditions:
          type: object
          description: Indicative chain health at time of quote.
          properties:
            congestion_level:
              type: string
              enum: [LOW, MEDIUM, HIGH]
            current_base_fee_gwei:
              type: string
              description: EVM chains only.
            average_block_time_seconds:
              type: number
        created_at:
          type: string
          format: date-time

    # ── PAYMENT IDENTIFICATION ────────────────────────────────────────────────

    PaymentIdentification:
      type: object
      description: |
        Reference identifiers for the instruction.
        Follows `PaymentIdentification13` from pacs.008.001.14.
      required: [end_to_end_identification]
      properties:
        message_identification:
          type: string
          maxLength: 35
          description: |
            Point-to-point reference assigned by the instructing party.
            Unique per VASP for a pre-agreed period. Follows pacs.008 `MessageIdentification`.
        end_to_end_identification:
          type: string
          maxLength: 35
          description: |
            Unique reference assigned by the initiating party. Preserved unchanged
            through the full chain. Equivalent to pacs.008 `EndToEndIdentification`.
        uetr:
          $ref: '#/components/schemas/UUIDv4'
          description: |
            Unique End-to-End Transaction Reference (UUIDv4). Assigned by the
            instructing party. If not provided, the VASP assigns one and returns
            it in the response. Aligns with SWIFT gpi UETR convention.
        quote_id:
          $ref: '#/components/schemas/UUIDv4'
          description: |
            Quote identifier from a prior `POST /instruction/quote` response.
            Locks the quoted fee schedule for the quote validity window.

    # ── BLOCKCHAIN INSTRUCTION ────────────────────────────────────────────────

    BlockchainInstruction:
      type: object
      description: |
        Blockchain-specific instruction parameters. Specifies the token, chain,
        wallet addresses, custody model, nonce, and slippage controls.
        This object has no direct pacs.008 equivalent — it is a pacs.crypto extension.
      required: [token, chain_dli, custody_model]
      properties:
        token:
          $ref: '#/components/schemas/TokenIdentification'
        chain_dli:
          type: string
          pattern: '^[A-Z0-9]{9}$'
          description: |
            ISO 24165-2 Digital Ledger Identifier — bare 9-character value.
            No DLID/ prefix in this field; the field name makes the type explicit.
            Use DLID/<value> in generic ISO 20022 fields such as
            settlement_information/clearing_system/proprietary.
          example: "X9J9XDMTD"
        custody_model:
          $ref: '#/components/schemas/CustodyModel'
        maximum_slippage_rate:
          type: string
          maxLength: 19
          pattern: '^0*(\d{0,2}\.\d{1,8}|\d{0,3})$'
          description: |
            Maximum acceptable slippage expressed as a decimal fraction
            (e.g. `0.005` = 0.5%). If the VASP cannot execute within this tolerance,
            the instruction is rejected with status `SLIPPAGE_EXCEEDED` rather than
            executed at an unexpected rate.

            Slippage applies to DEX-routed token transfers where liquidity depth
            affects the effective rate. For direct wallet-to-wallet transfers of
            established stablecoins at par (USDC → USDC), slippage is typically
            negligible and this field may be omitted.
        nonce:
          type: integer
          description: |
            EVM transaction nonce. Relevant in DELEGATED_SIGNING mode only.
            In FULL_CUSTODY mode the VASP manages the nonce — do not populate.
            In DELEGATED_SIGNING mode, the VASP returns the allocated nonce in the
            unsigned transaction response. The instructing party must use this exact
            nonce when signing. If the instructing party manages its own nonce
            sequence, it may provide the nonce on submission — the VASP will validate
            it is acceptable before returning the unsigned transaction.
        ramp_instruction:
          $ref: '#/components/schemas/RampInstruction'

    # ── REMITTANCE INFORMATION ────────────────────────────────────────────────

    RemittanceInformation:
      type: object
      description: |
        Structured and unstructured remittance information. Follows
        `RemittanceInformation26` from pacs.008.001.14. Carries invoice-level
        reconciliation detail to the beneficiary's ERP, delivered off-chain
        alongside the on-chain transfer. Solves structured remittance data loss
        at the crypto conversion point.
      properties:
        unstructured:
          type: string
          maxLength: 140
          description: Free-text remittance information (Max140Text).
        structured:
          type: object
          properties:
            creditor_reference_information:
              type: object
              properties:
                type:
                  type: object
                  properties:
                    code_or_proprietary:
                      type: object
                      properties:
                        code:
                          type: string
                          maxLength: 4
                          description: e.g. SCOR (structured creditor reference), RADM (remittance advice)
                reference:
                  type: string
                  maxLength: 35
                  description: Invoice number or creditor reference.
            referred_document_information:
              type: array
              maxItems: 10
              items:
                type: object
                properties:
                  type:
                    type: object
                    properties:
                      code_or_proprietary:
                        type: object
                        properties:
                          code:
                            type: string
                            description: e.g. CINV (commercial invoice), PUOR (purchase order)
                  number:
                    type: string
                    maxLength: 35
                  related_date:
                    type: object
                    properties:
                      type:
                        type: object
                        properties:
                          code:
                            type: string
                      date:
                        type: string
                        format: date

    # ── REGULATORY REPORTING ──────────────────────────────────────────────────

    RegulatoryReporting:
      type: object
      description: |
        Regulatory reporting details. Follows `RegulatoryReporting10` from
        pacs.008.001.14. Used to document the regulatory authority, jurisdiction,
        applicable regulation code, and which side of the transaction (DEBT/CRED/BOTH)
        the reporting obligation applies to.
      properties:
        authority:
          type: object
          properties:
            name:
              type: string
              maxLength: 140
              description: Name of the regulatory authority.
            country:
              type: string
              pattern: '^[A-Z]{2}$'
        details:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                maxLength: 35
                description: |
                  Regulatory code. Use jurisdiction-appropriate codes:
                  EU TFR = `EU-TFR`, MiCA = `EU-MICA`, FinCEN BSA = `US-BSA`,
                  MAS PSA = `MAS-PSA`, FCA = `UK-MLR`.
              debit_credit_reporting_indicator:
                type: string
                enum: [DEBT, CRED, BOTH]
                description: Which side of the transaction the reporting obligation applies to.
              country:
                type: string
                pattern: '^[A-Z]{2}$'
              information:
                type: string
                maxLength: 35

    # ── MAIN INSTRUCTION SCHEMA ───────────────────────────────────────────────

    PaymentInstruction:
      type: object
      description: |
        Blockchain payment instruction. Root object for `POST /instruction`.
        Modelled on `CreditTransferTransaction73` from pacs.008.001.14 with
        pacs.crypto extensions for blockchain settlement.

        **Mandatory fields** follow pacs.008 mandatory elements:
        `payment_identification`, `interbank_settlement_amount`, `charge_bearer`,
        `debtor`, `debtor_agent`, `creditor_agent`, `creditor`, plus
        `blockchain_instruction` (pacs.crypto extension).
      required:
        - payment_identification
        - interbank_settlement_amount
        - charge_bearer
        - debtor
        - debtor_agent
        - creditor_agent
        - creditor
        - blockchain_instruction
      properties:

        # ── pacs.008 HEADER FIELDS ──────────────────────────────────────────
        payment_identification:
          $ref: '#/components/schemas/PaymentIdentification'

        settlement_information:
          type: object
          description: |
            Identifies the blockchain on which the transfer settles.
            Follows `SettlementInstruction15` from pacs.008.001.14.
            Use `clearing_system/proprietary` to carry the chain identifier in
            `DLID/<dli>` (preferred) or `CHAINID:<code>` (fallback) format.
            This is semantically well-motivated: a blockchain IS the settlement
            infrastructure, directly analogous to TARGET2 or CHIPS in traditional
            payments. For multi-chain/bridge transfers, this identifies the
            origination chain; full leg-by-leg detail is in `blockchain_instruction`.

            **Ramp scenarios:** In onramp/offramp instructions, `settlement_information`
            always identifies the **blockchain execution chain** — the chain on which
            the on-chain transfer leg executes. It does not identify the clearing rail
            of the instructed currency (e.g. TARGET2 for EUR). The fiat leg is handled
            bilaterally between the instructing party and the VASP and is outside the
            scope of this field.
          properties:
            settlement_method:
              type: string
              enum: [INDA, INGA, COVE, CLRG]
              default: CLRG
              description: |
                Settlement method. Use `CLRG` (clearing system) for blockchain
                transfers — the blockchain IS the clearing system.
            clearing_system:
              type: object
              properties:
                proprietary:
                  type: string
                  maxLength: 35
                  description: |
                    Chain identifier in `DLID/<9-char-DLI>` (preferred) or
                    `CHAINID:<network-code>` (fallback) format.

                    | Value | Chain |
                    |---|---|
                    | `DLID/X9J9XDMTD` | Ethereum Mainnet |
                    | `DLID/4H95J0R2X` | Bitcoin Mainnet |
                    | `DLID/ZXTQFTM5G` | Solana Mainnet |
                    | `DLID/N3P9VQ6R1` | XRPL Mainnet |
                    | `DLID/T9B3X8H2K` | Polygon Mainnet |
                    | `CHAINID:ARB-1` | Arbitrum One (no DLI yet) |
                  example: "DLID/X9J9XDMTD"

        payment_type_information:
          type: object
          description: |
            Further specification of the transaction type.
            Follows `PaymentTypeInformation28` from pacs.008.001.14.
          properties:
            instruction_priority:
              type: string
              enum: [NORM, HIGH, URGENT]
              description: Processing priority requested by the instructing party.
            service_level:
              type: object
              properties:
                code:
                  type: string
                  maxLength: 4
                  description: e.g. SEPA, G001 (SWIFT gpi), or bilaterally agreed code.
            local_instrument:
              type: object
              description: |
                Used to carry the token identifier in the pacs.008 convention.
                `proprietary` field carries DTI in `DTID/<9-char>` format
                (analogous to usage in the Travel Rule API).
              properties:
                proprietary:
                  type: string
                  maxLength: 35
            category_purpose:
              type: object
              properties:
                code:
                  type: string
                  maxLength: 4
                  description: e.g. TRAD (trade), SUPP (supplier), SALA (salary), INTC (intra-company).

        interbank_settlement_amount:
          type: object
          description: |
            Amount and currency of the instruction, from the perspective of the
            instructing agent and the VASP. Follows `ActiveCurrencyAndAmount`.
            Where `currency` = XXX (no ISO 4217 code), this is a crypto-denominated
            instruction and `instructed_amount` carries the fiat equivalent.
          required: [amount, currency]
          properties:
            amount:
              type: string
              maxLength: 30
              description: Settlement amount. For tokens, may carry up to 18 decimal places.
            currency:
              type: string
              maxLength: 10
              description: ISO 4217 currency code or XXX for crypto-denominated instructions.

        instructed_amount:
          type: object
          description: |
            Amount and currency as instructed by the initiating party, before charges.
            Follows `ActiveOrHistoricCurrencyAndAmount` from pacs.008.001.14.
            Use when currency differs from `interbank_settlement_amount` (e.g. fiat
            equivalent of a crypto instruction, or onramp source amount).
          properties:
            amount:
              type: string
              maxLength: 30
            currency:
              type: string
              pattern: '^[A-Z]{3}$'

        interbank_settlement_date:
          type: string
          format: date
          description: |
            Requested settlement date. On blockchain this is the expected broadcast date.
            The VASP makes best efforts to broadcast on this date; `expiry_date_time`
            governs the deadline.

        expiry_date_time:
          type: string
          format: date-time
          description: |
            Instruction expiry. If the VASP cannot execute by this time (due to chain
            congestion, liquidity gap, or ramp unavailability), the instruction lapses
            with status `EXPIRED`. Recommended: 30 minutes for EVM chains, 5 minutes
            for Solana, 60 minutes for Bitcoin. Follows `expiry_date_time` from
            `GroupHeader131` and `AdditionalDateTime1` in pacs.008.001.14.

        charge_bearer:
          $ref: '#/components/schemas/ChargeBearerCode'

        exchange_rate:
          type: string
          maxLength: 19
          description: |
            Pre-agreed exchange rate between instructed currency and settlement currency.
            Follows `BaseOneRate` from pacs.008.001.14.

        agreed_rate:
          type: object
          description: |
            Pre-agreed exchange rate details. Follows `CurrencyExchange26` from
            pacs.008.001.14. Used when a rate has been pre-agreed with the VASP
            or a foreign exchange agent.
          properties:
            pre_agreed_exchange_rate:
              type: string
              maxLength: 19
            quotation_date_time:
              type: string
              format: date-time
            quote_identification:
              $ref: '#/components/schemas/UUIDv4'
            foreign_exchange_agent:
              $ref: '#/components/schemas/AgentIdentification'

        # ── PARTIES ─────────────────────────────────────────────────────────
        ultimate_debtor:
          $ref: '#/components/schemas/PartyIdentification'
          description: Ultimate party that owes the amount. Follows pacs.008 `UltimateDebtor`.

        initiating_party:
          $ref: '#/components/schemas/PartyIdentification'
          description: |
            Party initiating the instruction on behalf of the debtor.
            Follows pacs.008 `InitiatingParty`. Populate when the instructing
            party differs from the debtor (e.g. a payment factory or agent bank).

        debtor:
          $ref: '#/components/schemas/PartyIdentification'
          description: |
            Party that owes the amount. Mandatory. Follows pacs.008 `Debtor`.
            For a bank instructing on behalf of its corporate client, this is the
            corporate client.

        debtor_account:
          $ref: '#/components/schemas/CashAccount40'
          description: |
            Debtor's blockchain wallet account. Follows pacs.008 `DebtorAccount` /
            `CashAccount40`. Wallet address is carried in `proxy/EWAL`:
            - `proxy/type/code = EWAL` (Electronic Wallet, ExternalProxyAccountType1Code)
            - `proxy/identification` = the blockchain wallet address string
            - `type/proprietary = DIGT` indicates a digital asset wallet account

            For exchange/custodial accounts, `identification/other` may additionally
            carry an internal account or sub-account reference alongside the proxy.

        debtor_agent:
          $ref: '#/components/schemas/AgentIdentification'
          description: |
            Financial institution servicing the debtor's account. Mandatory.
            Follows pacs.008 `DebtorAgent`. For a bank sending on behalf of its
            client, this is the bank.

        creditor_agent:
          $ref: '#/components/schemas/AgentIdentification'
          description: |
            VASP or financial institution servicing the creditor. Mandatory.
            Follows pacs.008 `CreditorAgent`. This is the entity receiving the
            instruction and executing the blockchain transfer.

        debtor_crypto_agent:
          $ref: '#/components/schemas/AgentIdentification'
          description: |
            The VASP or crypto custodian that executes the blockchain transaction
            on behalf of the `debtor_agent`. Use in layered arrangements where a
            traditional financial institution (debtor_agent) outsources blockchain
            execution to a specialist crypto custodian (e.g. Fireblocks, Anchorage,
            Copper). Aligned with the pacs.crypto Travel Rule API.
            Omit when `debtor_agent` directly controls the signing wallet.

        creditor_crypto_agent:
          $ref: '#/components/schemas/AgentIdentification'
          description: |
            The VASP or crypto custodian that receives and credits the blockchain
            transaction on behalf of the `creditor_agent`. Use in layered arrangements
            where the beneficiary financial institution uses a separate crypto custodian.
            Aligned with the pacs.crypto Travel Rule API.
            Omit when `creditor_agent` directly controls the receiving wallet.

        creditor:
          $ref: '#/components/schemas/PartyIdentification'
          description: Party to which the amount is due. Mandatory. Follows pacs.008 `Creditor`.

        creditor_account:
          $ref: '#/components/schemas/CashAccount40'
          description: |
            Creditor's blockchain wallet account. Follows pacs.008 `CreditorAccount` /
            `CashAccount40`. Wallet address is carried in `proxy/EWAL`:
            - `proxy/type/code = EWAL` (Electronic Wallet, ExternalProxyAccountType1Code)
            - `proxy/identification` = the blockchain wallet address string
            - `type/proprietary = DIGT` indicates a digital asset wallet account

            For exchange/custodial accounts, `identification/other` may additionally
            carry an internal account or sub-account reference alongside the proxy.

        ultimate_creditor:
          $ref: '#/components/schemas/PartyIdentification'
          description: Ultimate party to which the amount is due. Follows pacs.008 `UltimateCreditor`.

        # ── INTERMEDIARY AGENTS ──────────────────────────────────────────────
        intermediary_agent1:
          $ref: '#/components/schemas/AgentIdentification'
          description: |
            Intermediary agent between debtor agent and creditor agent. Follows
            pacs.008 `IntermediaryAgent1`. In blockchain transfers, intermediary
            agents are typically not required for direct wallet-to-wallet transfers.
            Use for on/off-ramp scenarios where a specialist ramp provider acts as
            an intermediary converting between fiat and crypto.

        # ── INSTRUCTION ROUTING ──────────────────────────────────────────────
        instruction_for_next_agent:
          type: array
          maxItems: 5
          description: |
            Coded routing instructions for the next agent. Follows
            `InstructionForNextAgent1` from pacs.008.001.14.

            **pacs.crypto ramp coding convention:**
            Use `instruction_information` to carry the ramp instruction in the format:
            `ONRAMP/<LEI-of-ramp-VASP>` or `OFFRAMP/<LEI-of-ramp-VASP>`.
            Example: `ONRAMP/635400DUFB71VFOHVB49`

            This preserves ISO 20022 idiom for pacs.008-processing intermediaries
            while the structured `blockchain_instruction.ramp_instruction` object
            provides machine-parseable ramp parameters for pacs.crypto implementations.
          items:
            type: object
            properties:
              code:
                type: string
                maxLength: 4
                description: Coded instruction (e.g. PHOA, TELA per ISO 20022; or proprietary).
              instruction_information:
                type: string
                maxLength: 140
                description: |
                  Free-text or coded instruction. For ramp routing use:
                  `ONRAMP/<LEI>`, `OFFRAMP/<LEI>`, `ONRAMP_AND_OFFRAMP/<LEI>`.

        purpose:
          type: object
          description: |
            Underlying reason for the payment. Follows `Purpose2Choice` from
            pacs.008.001.14. Used by end-customers; not processed by agents.
          properties:
            code:
              type: string
              maxLength: 4
              description: e.g. TRAD (trade), SUPP (supplier), SALA (salary), INVS (investment), INTC (intra-company).

        # ── REGULATORY AND COMPLIANCE ────────────────────────────────────────
        regulatory_reporting:
          type: array
          maxItems: 10
          description: Regulatory reporting details. Follows pacs.008 `RegulatoryReporting10`.
          items:
            $ref: '#/components/schemas/RegulatoryReporting'

        travel_rule_record_id:
          $ref: '#/components/schemas/UUIDv4'
          description: |
            Record ID of a pre-submitted Travel Rule record in the pacs.crypto
            Travel Rule API. Links the payment instruction to its compliance record.
            For transfers above the FATF Travel Rule threshold, this field is
            strongly recommended and may be required by the VASP.

        # ── REMITTANCE ───────────────────────────────────────────────────────
        remittance_information:
          $ref: '#/components/schemas/RemittanceInformation'

        # ── BLOCKCHAIN EXTENSION ─────────────────────────────────────────────
        blockchain_instruction:
          $ref: '#/components/schemas/BlockchainInstruction'

    # ── RESPONSE SCHEMAS ──────────────────────────────────────────────────────

    InstructionResponse:
      type: object
      description: Response to a successful instruction submission.
      properties:
        instruction_id:
          $ref: '#/components/schemas/UUIDv4'
          description: VASP-assigned instruction identifier. Primary key for subsequent queries.
        uetr:
          $ref: '#/components/schemas/UUIDv4'
          description: UETR — assigned by VASP if not provided on submission.
        status:
          $ref: '#/components/schemas/InstructionStatus'
        custody_model:
          $ref: '#/components/schemas/CustodyModel'
        unsigned_transaction:
          type: object
          description: |
            Unsigned transaction for DELEGATED_SIGNING mode only.
            The instructing party signs this and submits via
            `POST /instruction/{instructionId}/signed-transaction`.
          properties:
            transaction_format:
              type: string
              enum: [RLP_EVM, PSBT_BITCOIN, SOLANA_TRANSACTION, XDR_XRP, OTHER]
              description: |
                Encoding format of the unsigned transaction data.

                | Format | Chain | Description |
                |---|---|---|
                | `RLP_EVM` | Ethereum, Polygon, Arbitrum, etc. | RLP-encoded EIP-1559 or legacy transaction |
                | `PSBT_BITCOIN` | Bitcoin | Partially Signed Bitcoin Transaction (BIP-174) |
                | `SOLANA_TRANSACTION` | Solana | Base64-encoded Solana transaction with recent blockhash |
                | `XDR_XRP` | XRPL | XDR-encoded unsigned transaction blob |
                | `OTHER` | Any | See `transaction_format_description` for encoding details |
            transaction_format_description:
              type: string
              maxLength: 200
              description: |
                Free-text description of the transaction format when `transaction_format = OTHER`.
                Bilaterally agreed encoding specification.
            transaction_data:
              type: string
              description: |
                Unsigned transaction data in the format specified by `transaction_format`.
                - `RLP_EVM`: hex-encoded RLP bytes, 0x-prefixed
                - `PSBT_BITCOIN`: base64-encoded PSBT
                - `SOLANA_TRANSACTION`: base64-encoded serialised transaction
                - `XDR_XRP`: hex-encoded XDR blob
            nonce:
              type: integer
              description: Allocated nonce. Must be used when signing.
            gas_limit:
              type: string
              description: Gas limit for EVM chains.
            max_fee_per_gas:
              type: string
              description: EIP-1559 maxFeePerGas in wei (EVM chains).
            max_priority_fee_per_gas:
              type: string
              description: EIP-1559 maxPriorityFeePerGas in wei (EVM chains).
            chain_id:
              type: integer
              description: EVM chain ID for replay protection.
        fee_estimate:
          $ref: '#/components/schemas/FeeEstimate'
        expiry_date_time:
          type: string
          format: date-time
        debit_timing:
          type: string
          enum: [ON_ACCEPTANCE, ON_BROADCAST, ON_FINALITY]
          description: |
            Indicates when the VASP will debit the instructing party's account
            or funding balance. Populated per the bilateral service agreement.

            | Value | Meaning |
            |---|---|
            | `ON_ACCEPTANCE` | Instructing party's account debited when instruction is accepted and queued |
            | `ON_BROADCAST` | Debited when the transaction is submitted to the blockchain network |
            | `ON_FINALITY` | Debited only when on-chain finality is confirmed |

            For fiat onramp/offramp instructions, this indicates when the fiat
            leg (e.g. nostro debit) occurs. Treasury systems should use this
            field to correctly reflect the pending debit in their books.
            If absent, the debit timing is governed by the bilateral agreement
            and is not exposed via the API.
        created_at:
          type: string
          format: date-time

    OnChainSettlement:
      type: object
      description: On-chain settlement data. Populated as the transaction progresses.
      properties:
        transaction_hash:
          type: string
          maxLength: 200
          description: On-chain transaction hash / TXID. The primary reference for on-chain verification.
        block_number:
          type: integer
          description: Block number in which the transaction was included.
        block_timestamp:
          type: string
          format: date-time
          description: Timestamp of the block containing the transaction.
        confirmation_depth:
          type: integer
          description: Number of blocks confirmed on top of the block containing the transaction.
        required_confirmation_depth:
          type: integer
          description: Confirmation depth the VASP considers sufficient for this chain and amount.
        finality_status:
          $ref: '#/components/schemas/FinalityStatus'
        actual_amount_transferred:
          type: string
          maxLength: 30
          description: Actual token amount transferred on-chain (post-slippage / post-ramp).
        actual_gas_cost_native:
          type: string
          maxLength: 30
          description: Actual gas cost in native token.
        actual_gas_cost_fiat:
          type: object
          properties:
            amount:
              type: string
              maxLength: 19
            currency:
              type: string
              pattern: '^[A-Z]{3}$'
        actual_slippage_rate:
          type: string
          maxLength: 19
          description: Actual slippage incurred, as a decimal fraction.

    InstructionStatusResponse:
      type: object
      description: Full instruction status response including on-chain settlement data.
      properties:
        instruction_id:
          $ref: '#/components/schemas/UUIDv4'
        uetr:
          $ref: '#/components/schemas/UUIDv4'
        status:
          $ref: '#/components/schemas/InstructionStatus'
        failure_reason:
          type: string
          maxLength: 500
          description: Human-readable failure reason for FAILED, SLIPPAGE_EXCEEDED, RAMP_FAILED, EXPIRED statuses.
        payment_identification:
          $ref: '#/components/schemas/PaymentIdentification'
        debtor:
          $ref: '#/components/schemas/PartyIdentification'
        creditor:
          $ref: '#/components/schemas/PartyIdentification'
        interbank_settlement_amount:
          type: object
          properties:
            amount:
              type: string
            currency:
              type: string
        blockchain_instruction:
          $ref: '#/components/schemas/BlockchainInstruction'
        on_chain_settlement:
          $ref: '#/components/schemas/OnChainSettlement'
        travel_rule_record_id:
          $ref: '#/components/schemas/UUIDv4'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expiry_date_time:
          type: string
          format: date-time

    SignedTransactionSubmission:
      type: object
      required: [signed_transaction_data]
      properties:
        transaction_format:
          type: string
          enum: [RLP_EVM, PSBT_BITCOIN, SOLANA_TRANSACTION, XDR_XRP, OTHER]
          description: |
            Encoding format of the signed transaction. Must match the format
            returned in the unsigned transaction response.
        signed_transaction_data:
          type: string
          description: |
            Signed transaction data in the format specified by `transaction_format`.
            Must use the exact nonce allocated by the VASP in the unsigned
            transaction response.
        submitted_at:
          type: string
          format: date-time

    BroadcastConfirmation:
      type: object
      properties:
        instruction_id:
          $ref: '#/components/schemas/UUIDv4'
        status:
          type: string
          enum: [BROADCAST]
        transaction_hash:
          type: string
          maxLength: 200
        broadcast_at:
          type: string
          format: date-time

    CancellationResponse:
      type: object
      properties:
        instruction_id:
          $ref: '#/components/schemas/UUIDv4'
        status:
          type: string
          enum: [CANCELLED]
        cancelled_at:
          type: string
          format: date-time

    InstructionSummary:
      type: object
      description: Compact instruction record for search results.
      properties:
        instruction_id:
          $ref: '#/components/schemas/UUIDv4'
        end_to_end_identification:
          type: string
        status:
          $ref: '#/components/schemas/InstructionStatus'
        debtor_name:
          type: string
        creditor_name:
          type: string
        amount:
          type: string
        currency:
          type: string
        token_symbol:
          type: string
        chain_dli:
          type: string
        transaction_hash:
          type: string
        created_at:
          type: string
          format: date-time
        finality_status:
          $ref: '#/components/schemas/FinalityStatus'

    InstructionSearchResponse:
      type: object
      properties:
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/InstructionSummary'
        total_matched:
          type: integer
        page_size:
          type: integer
        next_cursor:
          type: string
          nullable: true
        generated_at:
          type: string
          format: date-time

    # ── ACCOUNT IDENTIFICATION (shared with Travel Rule API) ─────────────────

    CashAccount40:
      type: object
      description: |
        Provides the details to identify an account.
        Source: pacs.008.001.14 CashAccount40.

        **Blockchain wallet address convention (aligned with pacs.crypto Travel Rule API):**
        - `proxy/type/code = EWAL` (Electronic Wallet, ExternalProxyAccountType1Code)
        - `proxy/identification` = the blockchain wallet address string
        - `type/proprietary = DIGT` to indicate a digital asset wallet account
        - Supports all address formats: Ethereum 0x… (42 chars), Bitcoin bc1…/1…/3…,
          Solana base58 (44 chars), XRP classic/X-address, TRON T… (34 chars), etc.

        For exchange/custodial accounts, `identification/other` may additionally
        carry an internal account or customer reference alongside the wallet address.
      properties:
        identification:
          type: object
          description: |
            Account identification. For pure wallet accounts use `proxy` (EWAL).
            Use `other` for exchange sub-accounts that have an internal account
            reference in addition to a wallet address.
          oneOf:
            - type: object
              required: [iban]
              properties:
                iban:
                  type: string
                  pattern: '^[A-Z]{2}[0-9]{2}[a-zA-Z0-9]{1,30}$'
                  description: IBAN — for fiat funding/settlement accounts, not wallet addresses.
            - type: object
              required: [other]
              properties:
                other:
                  type: object
                  required: [identification]
                  properties:
                    identification:
                      type: string
                      maxLength: 34
                      description: Account identification value (exchange customer ref, sub-account ID, etc.)
                    scheme_name:
                      type: object
                      oneOf:
                        - type: object
                          required: [code]
                          properties:
                            code:
                              type: string
                              maxLength: 4
                        - type: object
                          required: [proprietary]
                          properties:
                            proprietary:
                              type: string
                              maxLength: 35
        type:
          type: object
          description: |
            Nature or use of the account.
            Use `proprietary = DIGT` for digital asset / blockchain wallet accounts.
          oneOf:
            - type: object
              required: [code]
              properties:
                code:
                  type: string
                  maxLength: 4
                  description: ExternalCashAccountType1Code (CACC, SVGS, etc.)
            - type: object
              required: [proprietary]
              properties:
                proprietary:
                  type: string
                  maxLength: 35
                  description: Use "DIGT" for digital asset / blockchain wallet accounts.
                  example: "DIGT"
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: |
            ISO 4217 currency of the account. Use XXX for digital-asset-only
            accounts with no fiat denomination.
        name:
          type: string
          maxLength: 70
          description: Account name or label (e.g. "Main ETH Wallet", "Hot Wallet")
        proxy:
          $ref: '#/components/schemas/ProxyAccountIdentification1'

    ProxyAccountIdentification1:
      type: object
      description: |
        Proxy (alias) identification for an account.
        Source: pacs.008.001.14 ProxyAccountIdentification1.

        **Usage for blockchain wallet addresses:**
        Set `type/code = EWAL` (Electronic Wallet) and
        `identification` = the blockchain wallet address string.

        EWAL is the ISO 20022 ExternalProxyAccountType1Code for electronic wallets.
      required: [identification]
      properties:
        type:
          $ref: '#/components/schemas/ProxyAccountType1Choice'
        identification:
          type: string
          maxLength: 2048
          description: |
            The blockchain wallet address. Max2048Text accommodates all formats:
            - Ethereum/EVM: 0x + 40 hex chars (42 chars total)
            - Bitcoin bech32: bc1 + up to 62 chars
            - Solana: base58 44 chars
            - XRP classic: 25-34 base58 chars
            - TRON: T + 33 base58 chars
          example: "0x742d35Cc6634C0532925a3b8D4C9b8A1e3f6B7c9"

    ProxyAccountType1Choice:
      type: object
      description: |
        Specifies the scheme used for the account proxy/alias.
        Source: pacs.008.001.14 ProxyAccountType1Choice.
        For blockchain wallet addresses always use code = EWAL.
      oneOf:
        - type: object
          required: [code]
          properties:
            code:
              type: string
              minLength: 1
              maxLength: 4
              description: |
                ExternalProxyAccountType1Code.
                **EWAL** (Electronic Wallet) — use for all blockchain wallet addresses.
              example: "EWAL"
        - type: object
          required: [proprietary]
          properties:
            proprietary:
              type: string
              maxLength: 35

    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
          description: |
            Machine-readable error code. Values include:
            `MISSING_MANDATORY_FIELD`, `INVALID_WALLET_ADDRESS`,
            `SLIPPAGE_EXCEEDED`, `RAMP_FAILED`, `TRAVEL_RULE_RECORD_MISSING`,
            `UNSUPPORTED_TOKEN`, `UNSUPPORTED_CHAIN`, `QUOTE_EXPIRED`,
            `CANCELLATION_TOO_LATE`, `NONCE_CONFLICT`, `INSUFFICIENT_BALANCE`,
            `EXPIRED`.

            **Note:** `WALLET_SCREENING_FAILED` and equivalent codes that would
            reveal a sanctions finding are deliberately absent. Where an instruction
            cannot be executed for reasons that cannot be disclosed, `FAILED` is
            returned with no `failure_reason`. See the Sanctions section in the
            API description.
        message:
          type: string
          maxLength: 500
        field:
          type: string
          description: Field path where validation failed, if applicable.
        instruction_id:
          $ref: '#/components/schemas/UUIDv4'
        status:
          $ref: '#/components/schemas/InstructionStatus'

