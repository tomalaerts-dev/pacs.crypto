          type: string
          maxLength: 4
        additional_information:
          type: string
          maxLength: 140

    CreditorReferenceInformation3:
      type: object
      description: "Source: pacs.008.001.14 CreditorReferenceInformation3."
      properties:
        type:
          $ref: '#/components/schemas/CreditorReferenceType3'
