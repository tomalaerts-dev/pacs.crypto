            registration_identification: { type: string, maxLength: 35 }
            tax_type: { type: string, maxLength: 35 }
        debtor:
          type: object
          properties:
            tax_identification: { type: string, maxLength: 35 }
            registration_identification: { type: string, maxLength: 35 }
            tax_type: { type: string, maxLength: 35 }
        administration_zone:
          type: string
          maxLength: 35
        reference_number:
          type: string
          maxLength: 140
        total_taxable_base_amount:
