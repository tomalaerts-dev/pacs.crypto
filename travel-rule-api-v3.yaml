    CreditorReferenceType3:
      type: object
      description: "Source: pacs.008.001.14 CreditorReferenceType3."
      required: [code_or_proprietary]
      properties:
        code_or_proprietary:
          $ref: '#/components/schemas/CreditorReferenceType2Choice'
        issuer:
          type: string
          maxLength: 35

    CreditorReferenceType2Choice:
      type: object
      oneOf:
        - type: object
          required: [code]
          properties:
            code:
              type: string
              minLength: 1
              maxLength: 4
              description: |
                ExternalCreditorReferenceType1Code. Common values:
                SCOR (Structured Creditor Reference per ISO 11649),
                RADM (Remittance Advice Message)
              example: "SCOR"
        - type: object
          required: [proprietary]
