openapi: 3.1.0
info:
  title: Blockchain Travel Rule & Remittance Information API
  version: 3.5.0
  description: |
    ## Purpose

    This API serves two complementary purposes for VASPs and financial institutions
    processing blockchain transfers:

    **1. Regulatory compliance — Travel Rule (FATF R.16)**
    Exchange of originator and beneficiary identity information that must accompany
    virtual asset transfers under FATF Recommendation 16 and its regional
    implementations. All fields — mandatory, conditional, and optional — are
    modelled on pacs.008.001.14 components, with explicit FATF obligation annotations
    indicating which fields are required under which jurisdiction.

    Because the data model is identical to the pacs.008 structures that bank
    back-office systems already implement for conventional payment flows, integration
    requires no new data modelling or field mapping on the bank side. Originator and
    beneficiary data, party identification, account references, and remittance
    information can be sourced directly from existing payment processing pipelines
    and passed to this API without transformation.

    This alignment brings two distinct practical benefits:

    For **banks acting as debtor or creditor agents** in blockchain transfers — where
    the actual token execution is delegated to a crypto custodian — the Travel Rule
    obligation can be discharged directly between the two banks using this API,
    without involving the custodians in the identity exchange at all. The banks
    already hold the KYC data, already speak pacs.008, and already have bilateral
    API relationships with each other. The `debtor_crypto_agent` and
    `creditor_crypto_agent` fields identify the custodians for audit purposes, but
    the custodians are not party to the Travel Rule data exchange. This is a
    materially simpler operational model than routing Travel Rule data through
    VASP-to-VASP networks for what is essentially a bank-to-bank transaction.

    For **VASPs seeking to onboard bank clients**, the pacs.008 alignment removes
    the main technical barrier to adoption. A bank's compliance and operations teams
    face significant friction when a VASP's Travel Rule API speaks a proprietary
    schema (such as IVMS101 or a bespoke JSON structure): they must build a
    translation layer, get it approved by compliance, and explain to their auditors
    why the identity data looks different on the blockchain side than in their
    payment records. This API eliminates that translation layer entirely — a bank
    can source all required fields directly from its existing payment pipeline with
    no field mapping. The pacs.008 alignment also makes the bank's regulatory audit
    trail cleaner: a regulator examining a blockchain payment can trace identity data
    from the bank's core system through to the Travel Rule record without any semantic
    gaps or transformation steps.

    Note that the pacs.008 alignment reduces **integration effort**, not deployment
    infrastructure. Calling this API still requires the receiving party to provision
    and expose an HTTP endpoint — it cannot be sent over SWIFT like a native pacs.008
    message. See the "Deployment Ecosystem" section for guidance on the infrastructure
    context in which this API is intended to operate.

    **2. Commercial operations — Structured remittance information**
    Transmission of invoice references, creditor references, tax data, and payment
    purpose in a format directly compatible with the ISO 20022 pacs.008 messages that
    correspondent banks, ERP systems, and treasury platforms already implement for
    conventional payment flows.

    The second purpose addresses a genuine gap in current blockchain payment practice.
    Today, remittance information for crypto transfers is handled poorly and
    inconsistently: some senders stuff a plain invoice number into an OP_RETURN or
    memo field (Bitcoin allows 80 bytes; XRP/Stellar memo fields are similarly
    constrained); EVM transactions encode arbitrary calldata but with no standard
    structure; most B2B crypto payments simply send an email with the invoice
    separately, relying on manual reconciliation. In all cases, the structured
    remittance context present in a SEPA credit transfer or SWIFT MT103 is lost at
    the crypto conversion point.

    This API solves that by carrying `RemittanceInformation26` — the same structure
    used in pacs.008 for conventional payments — as an off-chain envelope alongside
    the on-chain transfer. The remittance data does not go on-chain (avoiding OP_RETURN
    size limits and GDPR concerns), but travels securely between VASPs and financial
    institutions via this API. The result is full invoice-level reconciliation detail
    reaching the beneficiary's ERP in the same structured format it would receive from
    a conventional bank transfer, regardless of whether the underlying settlement used
    Ethereum, Bitcoin, Polygon, or any other network.

    For financial institutions that already process pacs.008 for conventional payments,
    the remittance fields (`RemittanceInformation26`, `Purpose2Choice`, structured
    creditor references per ISO 11649) require no new data modelling — they are
    identical to what is already implemented.

    ## API Format, Transport, and Relation to Existing Travel Rule Networks

    This specification defines an **API format and REST interface** — a structured
    data model and a set of HTTP endpoints. It is not a Travel Rule network or
    transport protocol, and it is not a competitor to TRISA, TRP (Travel Rule
    Protocol), OpenVASP, Sygna, or equivalent networks.

    **What this spec defines:**
    - The structure of Travel Rule messages (what fields are exchanged and how)
    - The REST interface through which those messages are submitted and retrieved
    - The callback mechanism for data quality acknowledgement
    - The search and reporting interface for local record querying

    **What this spec does not define:**
    - How two parties discover each other (counterparty directory / VASP lookup)
    - How the communication channel is authenticated end-to-end (PKI / CA model)
    - How the API endpoint URL for a given creditor agent is resolved
    - The network or transport over which the API call is carried

    These concerns are addressed at the deployment ecosystem level (see "Deployment
    Ecosystem" section) and are intentionally out of scope here.

    **Relation to existing Travel Rule networks:**
    This API format can be carried over any secure bilateral channel, including
    over existing Travel Rule network transports. A VASP already enrolled in TRISA
    or TRP could expose this interface over that network's secure channel, combining
    the network's counterparty discovery and PKI with this spec's message format and
    REST interface design. The two layers are independent: adopting this format does
    not require migrating away from an existing Travel Rule network, and existing
    Travel Rule network members can adopt this format incrementally.

    For bilateral deployments between two known counterparties — for example, a bank
    and its preferred VASP custodian — no Travel Rule network membership is required.
    The parties establish a direct authenticated API connection under their existing
    legal agreement, and this spec defines what they exchange over that connection.

    ## Sanctions Compliance — Critical Note on Intended Use

    **This API is not a pre-clearance or pre-screening mechanism for sanctions.**

    The Travel Rule information exchanged via this API serves the sending VASP's
    obligation to screen outgoing transfers before initiation, and the receiving
    VASP's obligation to retain identity information for audit and investigation
    purposes. It must not be used by the receiving VASP as an upfront gate to
    conditionally accept or reject incoming funds based on a sanctions check result.

    The correct legal obligation for the receiving VASP under OFAC, EU sanctions
    regulations, and equivalent frameworks is:

    1. **Accept the incoming funds** — refusing to receive is not the required response
       and may itself constitute a regulatory violation in some jurisdictions.
    2. **Screen upon receipt** — run sanctions checks against the received funds and
       the associated Travel Rule identity data immediately on arrival.
    3. **Freeze and block** — if a sanctions match is confirmed, freeze the assets
       immediately. Do not credit the beneficiary's account.
    4. **Report to the competent authority** — file a report with the relevant
       authority (OFAC, FSMA, DNB, FinCEN, MAS, etc.) within the required timeframe.
       Do not return the funds to the sender — returning sanctioned assets is itself
       a sanctions violation in most jurisdictions.

    **Why the receiving VASP must not notify the sender of a sanctions hit:**
    If a receiving VASP were to communicate a sanctions finding back to the sending
    VASP before or after the transfer — and the sending VASP then cancelled, rerouted,
    or warned the originator — the sanctioned party would receive advance notice and
    could attempt to evade detection through structuring, timing changes, or
    alternative routing. This is known as **tipping off** and is a criminal offence
    under the EU's Anti-Money Laundering Directives, the UK Proceeds of Crime Act,
    the US Bank Secrecy Act, and most equivalent national legislation. Regulators are
    explicitly aware of pre-screening evasion as an emerging risk in virtual asset
    markets.

    The absence of a sanctions notification mechanism in this API is therefore not
    an oversight or a gap — it is the correct and legally required design. An API
    that provided a channel for communicating sanctions findings to the sending VASP
    would be actively harmful and potentially create criminal liability for
    implementing parties. Implementers must not attempt to repurpose any existing
    API field (including the `REJECTED` callback status or free-text description
    fields) for this purpose.

    **What the `sanctions_screening` field represents:**
    The `sanctions_screening` object on a Travel Rule record documents the
    **sending VASP's own screening** of the outgoing transfer — which is a genuine
    obligation (a sending VASP must not knowingly initiate a transfer to a sanctioned
    party). It is an audit trail of the sender's compliance process, not a signal
    to the receiving VASP about whether to accept the transfer. The receiving VASP
    must conduct their own independent screening upon receipt of funds, entirely
    separate from this API exchange.

    **What the `REJECTED` record status represents:**
    The `REJECTED` status indicates that the receiving VASP has determined the
    submitted Travel Rule data is incomplete, inconsistent, or fails data quality
    validation (e.g. missing mandatory fields, unrecognised party identifiers).
    It must not be used to communicate a sanctions-based refusal to receive funds.
    A data quality rejection may prompt the sending VASP to correct and resubmit
    the record, but it has no bearing on whether the on-chain transfer proceeds.

    ## Record Lifecycle

    The following diagram shows the complete flow between sending and receiving VASP.
    The on-chain transfer and the Travel Rule data exchange are independent — the
    blockchain does not consult this API and the API does not gate the transfer.

    ```
    Sending VASP                                   Receiving VASP
         │                                               │
         │  1. POST /v1/travel-rule                      │
         │     (TravelRuleSubmission)                    │
         │──────────────────────────────────────────────►│
         │  ← 201 Created {record_id, status:SUBMITTED}  │
         │                                               │  validates data quality
         │                                               │  (not a sanctions check)
         │                                               │
         │  2. POST /v1/travel-rule/{record_id}/callback │
         │     (TravelRuleCallback)                      │
         │◄──────────────────────────────────────────────│
         │  → 200 OK {current_status: ACCEPTED|REJECTED} │
         │                                               │
         │             ╔══════════════════╗              │
         │             ║  On-chain tx     ║              │
         │             ║  executes        ║              │
         │             ║  independently   ║              │
         │             ╚══════════════════╝              │
         │                                               │
         │                         funds arrive at receiving VASP
         │                                               │
         │                               3. Receiving VASP screens
         │                                  upon receipt of funds
         │                                  (independent of API)
         │                                               │
         │                               4a. CLEAR → credit beneficiary
         │                               4b. SANCTIONS HIT → freeze + report
         │                                   to competent authority
         │                                   (no API call — internal process)
    ```

    **Record status transitions (sending VASP side):**

    | Event | Status transition |
    |---|---|
    | POST /travel-rule accepted | → SUBMITTED |
    | Callback received: ACCEPTED | SUBMITTED → ACCEPTED |
    | Callback received: REJECTED | SUBMITTED → REJECTED |
    | Callback received: UNDER_REVIEW | SUBMITTED → UNDER_REVIEW |
    | Resubmitted after REJECTED (PUT with `correction_of_callback_ref`) + new callback ACCEPTED | REJECTED → ACCEPTED |
    | Retention period elapsed | any → ARCHIVED |

    When resubmitting a corrected record after a REJECTED callback, include the
    optional `correction_of_callback_ref` object in the PUT request body. This
    field carries the `callback_timestamp` of the REJECTED callback being addressed,
    and optionally the `receiving_vasp_record_ref` if one was provided. This allows
    the receiving VASP to automatically correlate the correction to their open
    rejection record and queue it for targeted re-validation against the original
    rejection reason, rather than full re-review. It also makes the correction
    chain self-documenting for regulatory audit purposes.

    ## Regulatory Background

    **FATF Recommendation 16** requires that originator and beneficiary information
    "travel with" a virtual asset transfer. Key thresholds and requirements:

    | Jurisdiction | Regulation | Threshold | Notes |
    |---|---|---|---|
    | Global | FATF R.16 | USD/EUR 1,000 | Baseline; name + account mandatory below threshold |
    | European Union | TFR (2023/1113) | EUR 0 | No threshold — all transfers |
    | United States | FinCEN Travel Rule | USD 3,000 | Bank Secrecy Act |
    | Singapore | MAS PSN02 | SGD 1,500 | Payment Services Act |
    | Canada | FINTRAC | CAD 1,000 | PCMLTFA |
    | Switzerland | FINMA | CHF 1,000 | |
    | United Kingdom | FCA | GBP 1,000 | |

    **Mandatory originator information (all jurisdictions):**
    - Full name
    - Account number / wallet address used for the transaction
    - One of: physical address, national identity number, date & place of birth,
      or customer identification number

    **Mandatory beneficiary information:**
    - Full name
    - Account number / wallet address
    - Physical address or national ID required in some jurisdictions (EU TFR, FinCEN)

    **VASP identification:** Both originating and beneficiary VASP must be identified.
    In layered arrangements (traditional FI + crypto custodian), both the financial
    institution with the customer relationship and the entity executing on-chain
    must be separately identified (see `debtor_crypto_agent` / `creditor_crypto_agent`).

    ## ISO 20022 Alignment

    Data components are taken directly from **pacs.008.001.14**
    (FIToFICustomerCreditTransferV14). Component names and field constraints
    are preserved exactly.

    Key mapping decisions:
    - `PartyIdentification272` → Debtor, Creditor, UltimateDebtor, UltimateCreditor
    - `CashAccount40` → DebtorAccount, CreditorAccount (wallet address in `proxy/EWAL`)
    - `BranchAndFinancialInstitutionIdentification8` → DebtorAgent, CreditorAgent,
      DebtorCryptoAgent, CreditorCryptoAgent
    - `RemittanceInformation26` → Full structured remittance (invoices, creditor refs,
      tax, purpose) — identical to conventional pacs.008 remittance structure
    - `RegulatoryReporting10` → Jurisdiction-specific reporting (max 10 instances)
    - `SettlementInstruction15/ClearingSystem/proprietary` → Primary blockchain network
      using `DLID/<dli>` (preferred) or `CHAINID:<code>` (fallback) convention

    ## Blockchain Network / Ledger Identification

    The primary settlement blockchain is identified in
    `SettlementInstruction/ClearingSystem/proprietary` (Max35Text).

    **Preferred: DLI (ISO 24165-2 Digital Ledger Identifier)**
    The DLI is the standardised, registry-backed identifier for distributed ledgers,
    published under the same ISO 24165 standard family as the DTI (see Token
    Identification below). Use format `DLID/<9-char-DLI>`, e.g. `DLID/4H95J0R2X`
    for Bitcoin. At 14 characters maximum this fits comfortably within Max35Text.
    The DLI registry is live as of late 2024 and growing; use DLI wherever the
    chain has a registered identifier.

    **Fallback: CHAINID compact codes**
    When a chain has no DLI registration yet, use `CHAINID:<network-code>`.
    EVM chains use their numeric chain ID; non-EVM chains use their well-known
    ticker symbol.

    | Proprietary value | Chain | DLI | CAIP-2 |
    |---|---|---|---|
    | `DLID/4H95J0R2X` | Bitcoin Mainnet | 4H95J0R2X | bip122:000000...e93 |
    | `DLID/X9J9XDMTD` | Ethereum Mainnet | X9J9XDMTD | eip155:1 |
    | `CHAINID:ETH-137` | Polygon Mainnet | pending | eip155:137 |
    | `CHAINID:ETH-56` | BNB Smart Chain | pending | eip155:56 |
    | `CHAINID:ETH-43114` | Avalanche C-Chain | pending | eip155:43114 |
    | `CHAINID:ETH-42161` | Arbitrum One | pending | eip155:42161 |
    | `CHAINID:ETH-8453` | Base | pending | eip155:8453 |
    | `DLID/ZXTQFTM5G` | Solana Mainnet | ZXTQFTM5G | solana:4sgj... |
    | `DLID/N3P9VQ6R1` | XRPL Mainnet | N3P9VQ6R1 | xrpl:1 |
    | `CHAINID:TRX` | Tron Mainnet | pending | tron:1 |
    | `CHAINID:XLM` | Stellar Pubnet | pending | stellar:pubnet |
    | `CHAINID:ADA` | Cardano Mainnet | pending | — |
    | `CHAINID:DOT` | Polkadot Mainnet | pending | — |

    Note: DLI values shown for Bitcoin and Ethereum match their native asset DTI
    by design in ISO 24165 — for chains where the ledger and native asset are
    inseparable, the identifiers are shared. DLI registry: https://dtif.org

    Full CAIP-2 identifiers and per-leg chain detail are in
    `blockchain_settlement/legs[]` where there is no length constraint.
    Each leg also carries a `chain_dli` field for the DLI of that specific leg's chain.

    ## Blockchain Address Convention

    Blockchain wallet addresses are carried in `CashAccount40/proxy` using
    `ProxyAccountType1Choice/code = EWAL` (Electronic Wallet,
    ExternalProxyAccountType1Code). The wallet address string goes in
    `proxy/identification` (Max2048Text), accommodating all address formats.

    **FATF requirement:** The wallet address used for the transaction is mandatory
    Travel Rule information in all jurisdictions. For unhosted wallets, it remains
    required on the hosted VASP side even when the counterpart cannot be identified.

    ## Digital Asset / Token Identification

    Token identification follows a priority hierarchy from most to least standardised.
    The `local_instrument/proprietary` field (Max35Text) carries the primary identifier
    for the origination leg token. For tokens that cannot be identified within 35
    characters (notably by on-chain contract address), the `token_identification`
    extension object provides a full fallback hierarchy with no length constraints.

    **Recommendation: populate multiple identifiers wherever possible.**
    Token identifier standards are at different stages of adoption across the industry.
    DTI registry coverage is growing but not yet universal; not all counterparty systems
    resolve DTIs today. Contract address + chain is currently the most universally
    resolvable identifier — any on-chain token can be unambiguously identified this
    way, and any counterparty with blockchain access can verify it independently.
    Submitting both a DTI (in `local_instrument/proprietary`) and a contract address
    (in `token_identification`) ensures the record is resolvable by counterparties
    at any stage of identifier standard adoption. For well-known assets where a DTI
    is registered (see table below), there is no reason not to include it.

    A REJECTED callback with code `UNRESOLVABLE_IDENTIFIER` should only be issued
    when no usable identifier was provided at all. It must not be issued when a
    contract address is present and resolvable, even if the receiving VASP does not
    yet support DTI lookup.

    **Priority order — use the highest applicable, and include lower levels as fallback:**

    | Priority | Identifier | Field format | Max35 fit | Notes |
    |---|---|---|---|---|
    | 1 | **DTI** (ISO 24165-1) | `DTID/<9-char>` | ✅ 14 chars | Preferred — registry-backed, chain-agnostic, issuer-independent |
    | 2 | **ISIN** (ISO 6166) | `ISIN/<12-char>` | ✅ 17 chars | Tokenised securities; some regulated stablecoins |
    | 3 | **Contract address** | see `token_identification` | ❌ 52+ chars | Universally resolvable today — always include for on-chain tokens |
    | 4 | **Ticker + chain** | see `token_identification` | — | Last resort; tickers are not globally unique |

    **Forward-looking note on DTI and DLI adoption:**
    ISO 24165 (DTI for tokens, DLI for ledgers) is the emerging global standard for
    digital asset identification, with active registry development at DTIF
    (https://dtif.org). Regulatory pressure — particularly from FATF, the EU MiCA
    framework, and national supervisors — is expected to drive mandatory adoption of
    canonical identifiers for Travel Rule and AML reporting purposes. Implementations
    that adopt DTI and DLI now will have cleaner, regulator-ready data as this
    requirement crystallises, and will benefit from simplified identifier handling
    as registry coverage expands to cover all major assets and chains. The CHAINID
    fallback format used in this spec for chains without DLI registration is intended
    as a transitional measure only.

    **Why contract address cannot go in `local_instrument/proprietary`:**
    An EVM contract address is 42 characters (0x + 40 hex). With a chain qualifier
    the full reference is `ADDR/ETH-1/0x<40chars>` = 52 characters, exceeding
    Max35Text. Use the `token_identification` extension object for contract-address
    identification; it has no length constraint and includes a chain qualifier to
    ensure global uniqueness (the same address pattern can appear on multiple EVM chains).

    **Common DTI values:**

    | `local_instrument/proprietary` | Asset | Network |
    |---|---|---|
    | `DTID/4H95J0R2X` | Bitcoin (BTC) | Bitcoin |
    | `DTID/X9J9XDMTD` | Ether (ETH) | Ethereum |
    | `DTID/T9B3X8H2K` | USD Coin (USDC) | Multi-chain |
    | `DTID/ZXTQFTM5G` | Solana (SOL) | Solana |
    | `DTID/N3P9VQ6R1` | XRP | XRPL |
    | `DTID/2Y6BXHD9K` | Tether USD (USDT) | Multi-chain |
    | `DTID/P7RQMX4KJ` | BNB | BNB Chain |

    **Settlement amount currency convention:**
    - Stablecoins pegged to fiat → use the fiat ISO 4217 code (USD for USDC, EUR for EURC).
      The DTI and wallet addresses make clear this is a crypto transfer, not a fiat wire.
    - Native / non-stablecoin tokens → use ISO 4217 `XXX` (no currency) and express
      the native token quantity as the numeric amount value.

    ## Note on DTI and DLI Example Values

    Example DTI and chain-id values used throughout this specification (e.g.
    `X9J9XDMTD`, `T9B3X8H2K`, `ETH-1`) are illustrative and may not correspond
    to live entries in the DTIF registry (https://dtif.org). ISO 24165-2 DLI
    is an emerging companion standard to ISO 24165-1 DTI; until DLIs are broadly
    registered, implementers may use the native-token DTI of a chain as a proxy
    chain identifier (e.g. DTI `XB0MQJ1K5` for Ether → Ethereum Mainnet).
    Implementers must verify actual DTI and DLI values against the DTIF registry
    at integration time.

    ## Multi-Chain / Bridge Transfers

    When a transfer crosses chains via a bridge protocol (e.g. Stargate, LayerZero,
    Wormhole, THORChain, CCTP), there may be distinct on-chain transactions on the
    origination chain, the destination chain, and the bridge itself. These are captured
    in `blockchain_settlement/legs[]` with typed leg entries (ORIGINATION, BRIDGE,
    DESTINATION). The token identification and amount are captured per leg since
    bridged tokens may differ from native tokens (e.g. WBTC vs BTC, bridged USDC vs
    native USDC) and bridge fees reduce the amount across legs. Each leg carries both
    `token_dti` (for DTI-registered tokens) and a `token_identification` object
    (for the full fallback hierarchy including contract addresses).

    ## Deployment Ecosystem

    **Minimum viable deployment (bilateral, known counterparties):**
    Two parties with an existing legal relationship can deploy this API today
    with no additional ecosystem infrastructure. They exchange API endpoint URLs
    and certificates bilaterally, establish transport security under their existing
    legal agreement, and begin exchanging Travel Rule records immediately. This is
    the recommended starting point for bank-VASP pairs and for institution pairs
    already connected via correspondent banking agreements. No Travel Rule network
    membership, no third-party directory, and no external CA are required.

    **Scaling to network-level deployment (many counterparties):**
    For deployment across a broad and partially unknown counterparty network, three
    additional ecosystem components are needed. This spec is intentionally silent
    on all three — they are addressed at the ecosystem level and are independent
    of the message format and interface defined here.

    *1. Public Key Infrastructure (PKI)*
    Mutual TLS (mTLS) is the recommended transport security model: each party
    presents a certificate, and both sides verify each other's identity before
    exchanging any data. This requires a certificate authority (CA) model under
    which VASPs and financial institutions obtain and maintain certificates.

    Several candidate CA models exist depending on the deployment context:
    - For bank-to-bank deployments: existing bank PKI infrastructure (SWIFT PKI,
      internal CA hierarchies) is directly applicable.
    - For VASP networks: an industry-operated CA, potentially operated by a Travel
      Rule network (TRISA operates one), a national supervisory authority, or a
      body such as GLEIF (which already issues LEI certificates).
    - For bilateral deployments: direct certificate exchange between two parties
      under their existing legal agreement, without a third-party CA.

    The mTLS + bearer token authentication described in this spec's security schemes
    is illustrative of one reasonable model. The actual certificate authority and
    issuance process is determined by the deployment ecosystem, not this spec.

    *2. Reference Data Directory*
    Two distinct reference data needs must be addressed by the ecosystem:

    Endpoint discovery — given a creditor agent identified by LEI or BIC, what
    is the URL of their Travel Rule API endpoint? Without a directory service,
    senders cannot route Travel Rule submissions to the correct receiver. Candidate
    directory services include: TRISA's Global VASP Directory, a SWIFT BIC-to-API-URL
    extension, a national supervisory register (some jurisdictions are moving in this
    direction), or bilateral URL exchange under a legal agreement for known
    counterparty pairs.

    Identifier registries — for canonical chain and token identification, the
    authoritative registry is operated by DTIF (https://dtif.org) under ISO 24165:
    the DLI registry for distributed ledgers and the DTI registry for digital tokens.
    Implementations should integrate DLI and DTI lookup against the DTIF registry
    for validation and enrichment of identifier fields.

    *3. Legal and Governance Framework*
    The API call constitutes an exchange of personal data (originator name, address,
    identification numbers) across institutional boundaries. This requires a legal
    basis under applicable data protection law (GDPR Article 6 for EU parties,
    equivalents elsewhere), typically provided by a bilateral data sharing agreement
    or by participation in a Travel Rule network with standardised legal terms.
    Regulatory authorisation to operate as a VASP is also a prerequisite in most
    jurisdictions before a Travel Rule obligation arises.

    For network-scale deployment, participation in a Travel Rule network that
    provides PKI and directory services is recommended. This spec's message format
    and REST interface can be adopted alongside any such network without requiring
    migration away from existing network membership.

